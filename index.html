<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDG Quiz - FIXED</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #111111; --border: #222222; --border-bright: #333333;
  --text: #e8e8e8; --text-dim: #666666; --text-mid: #999999;
  --green: #22c55e; --green-bg: #052010; --green-border: #166534;
  --red: #ef4444; --red-bg: #200505; --red-border: #7f1d1d;
  --accent: #f5f5f5; --yellow: #eab308; --blue: #3b82f6;
}
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
#app { width: 100%; max-width: 720px; padding: 24px 16px; min-height: 100vh; display: flex; flex-direction: column; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.header h1 { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-mid); }
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }
.setup-title { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
.setup-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 36px; }
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
.week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 8px; margin-bottom: 28px; }
.week-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-mid); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 6px; cursor: pointer; text-align: center; transition: all 0.1s; user-select: none; }
.week-btn:hover { border-color: var(--border-bright); color: var(--text); }
.week-btn.selected { border-color: var(--text); color: var(--accent); background: #1a1a1a; }
.week-btn.all-btn { grid-column: 1 / -1; font-size: 11px; }
.options-row { display: flex; gap: 8px; margin-bottom: 28px; }
.opt-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-mid); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 12px; cursor: pointer; text-align: center; transition: all 0.1s; user-select: none; }
.opt-btn:hover { border-color: var(--border-bright); color: var(--text); }
.opt-btn.selected { border-color: var(--text); color: var(--accent); background: #1a1a1a; }
.timer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
.timer-row label { font-size: 12px; color: var(--text-mid); cursor: pointer; display: flex; align-items: center; gap: 8px; }
.timer-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 8px 10px; width: 100px; outline: none; }
.start-btn { background: var(--text); color: #000; border: none; font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 16px 32px; cursor: pointer; width: 100%; transition: opacity 0.1s; }
.start-btn:hover { opacity: 0.88; }
.quiz-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); }
.quiz-progress { display: flex; align-items: center; gap: 12px; }
.progress-count { font-size: 13px; color: var(--text); }
.question-text { font-size: 16px; font-weight: 500; line-height: 1.6; margin-bottom: 28px; color: var(--text); }
.options-list { display: flex; flex-direction: column; gap: 8px; }
.option { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 14px 16px; cursor: pointer; text-align: left; display: flex; align-items: flex-start; gap: 12px; transition: border-color 0.1s; line-height: 1.5; }
.option:hover:not(.locked) { border-color: var(--border-bright); }
.option .opt-letter { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-dim); min-width: 16px; margin-top: 1px; }
.option.correct { border-color: var(--green-border); background: var(--green-bg); color: var(--green); }
.option.correct .opt-letter { color: var(--green); }
.option.wrong { border-color: var(--red-border); background: var(--red-bg); color: var(--red); }
.option.wrong .opt-letter { color: var(--red); }
.option.locked { cursor: default; }
.option.dimmed { opacity: 0.35; }
.feedback-row { margin-top: 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.feedback-msg { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.04em; }
.feedback-msg.correct { color: var(--green); }
.feedback-msg.wrong { color: var(--red); }
.button-group { display: flex; gap: 8px; align-items: center; }
.nav-btn { background: transparent; border: 1px solid var(--border-bright); color: var(--text-mid); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 10px 16px; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.nav-btn:hover { border-color: var(--text); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.back-menu-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 4px 10px; cursor: pointer; transition: all 0.1s; }
.back-menu-btn:hover { border-color: var(--border-bright); color: var(--text); }
.score-mini { display: flex; gap: 16px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 28px; }
.score-mini span.g { color: var(--green); }
.score-mini span.r { color: var(--red); }
.results-header { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.results-title { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat-box { background: var(--surface); border: 1px solid var(--border); padding: 14px; text-align: center; }
.stat-val { font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 600; display: block; margin-bottom: 4px; }
.stat-val.g { color: var(--green); }
.stat-val.r { color: var(--red); }
.stat-val.y { color: var(--yellow); }
.stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
.results-actions { display: flex; gap: 8px; margin-top: 32px; }
.action-btn { flex: 1; padding: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: 1px solid var(--border-bright); background: transparent; color: var(--text-mid); transition: all 0.1s; }
.action-btn:hover { border-color: var(--text); color: var(--text); }
.action-btn.primary { background: var(--text); color: #000; border-color: var(--text); }
</style>
</head>
<body>
<div id="app">
  <div class="header"><h1>SDG Quiz</h1></div>
  
  <div class="screen active" id="screen-setup">
    <div class="setup-title">Practice Session</div>
    <div class="setup-sub">Configure your quiz and start practicing.</div>
    <div class="section-label">Select Weeks</div>
    <div class="week-grid" id="week-grid">
      <button class="week-btn all-btn selected" data-week="all">All Weeks (130 questions)</button>
    </div>
    <div class="section-label">Question Order</div>
    <div class="options-row">
      <button class="opt-btn selected" id="btn-random" onclick="setOrder('random')">Random</button>
      <button class="opt-btn" id="btn-ordered" onclick="setOrder('ordered')">In Order</button>
    </div>
    <div class="section-label">Mode</div>
    <div class="options-row">
      <button class="opt-btn selected" id="btn-exam" onclick="setMode('exam')">Exam</button>
      <button class="opt-btn" id="btn-learn" onclick="setMode('learn')">Learn</button>
    </div>
    <div class="section-label">Timer</div>
    <div class="timer-row">
      <label>
        <input type="checkbox" id="timer-enabled" onchange="toggleTimer(this.checked)">
        Enable timer per question
      </label>
      <input type="number" class="timer-input" id="timer-seconds" value="30" min="5" max="300" disabled>
      <span style="font-size:11px;color:var(--text-dim);">seconds</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">Start Quiz →</button>
  </div>
  
  <div class="screen" id="screen-quiz">
    <div class="quiz-topbar">
      <div class="quiz-progress">
        <button class="back-menu-btn" onclick="goSetup()">← Menu</button>
        <span class="progress-count" id="q-count">1 / 10</span>
      </div>
    </div>
    <div class="question-text" id="q-text"></div>
    <div class="options-list" id="q-options"></div>
    <div class="feedback-row">
      <div class="feedback-msg" id="feedback-msg"></div>
      <div class="button-group">
        <button class="nav-btn" id="prev-btn" style="display:none;" onclick="prevQuestion()">← Prev</button>
        <button class="nav-btn" id="next-btn" style="display:none;" onclick="nextQuestion()">Next →</button>
      </div>
    </div>
    <div class="score-mini">
      <span>Correct: <span class="g" id="score-correct">0</span></span>
      <span>Wrong: <span class="r" id="score-wrong">0</span></span>
    </div>
  </div>
  
  <div class="screen" id="screen-results">
    <div class="results-header">
      <div class="results-title">Session Complete</div>
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-val" id="res-total">0</span>
          <span class="stat-label">Questions</span>
        </div>
        <div class="stat-box">
          <span class="stat-val g" id="res-correct">0</span>
          <span class="stat-label">Correct</span>
        </div>
        <div class="stat-box">
          <span class="stat-val r" id="res-wrong">0</span>
          <span class="stat-label">Wrong</span>
        </div>
        <div class="stat-box">
          <span class="stat-val y" id="res-pct">0%</span>
          <span class="stat-label">Score</span>
        </div>
      </div>
    </div>
    <div class="results-actions">
      <button class="action-btn primary" onclick="goSetup()">New Session</button>
    </div>
  </div>
</div>

<script>
const RAW = {0:[{q:"The full form of SDGs is ___.",opts:["Sustainable Development Guide","Sensitive Development Guide","Sustainable Driving Goals","Sustainable Development Goals"],ans:3},{q:"The SDGs have been adopted by ___ member states.",opts:["United Kingdom","South African","Asian","United Nations"],ans:3},{q:"SDGs consist of ___ number of goals.",opts:["30","15","13","17","21"],ans:3}],1:[{q:"SDG 2 aims to end all forms of ___ by 2030.",opts:["crime","hunger and malnutrition","pollution","drought"],ans:1},{q:"Forests cover about ___ percent of the Earth's surface.",opts:["5","85","30","50"],ans:2}],2:[{q:"Which of the following is a characteristic of ESD?",opts:["It is not locally relevant","It promotes learning only for children","It is interdisciplinary","It uses only two techniques"],ans:2},{q:"___ plays a role in peace education.",opts:["Schools","Parents","Community","All the given"],ans:3}],3:[{q:"Global citizenship is a belief that individuals are members of ___ networks.",opts:["Multiple","Diverse","Local and non-local","All of the given"],ans:3},{q:"A global citizen ___.",opts:["Is not aware of the wider world","Is confused about their place","Takes an active role in their community","Does not care about the planet"],ans:2}],4:[{q:"GESO stands for ___.",opts:["Green Education for Sustainable Occupation","Green Enhanced Sustainable Occupation","Green Enhanced Skills Occupation","None"],ans:2},{q:"ESD requires ___ learning methods.",opts:["Participatory","Passive","Rigid","Static"],ans:0}],5:[{q:"Siddha comes under the ___.",opts:["Public health sector","Voluntary health agencies","Indigenous system of medicine","Private health sector"],ans:2},{q:"Which of the following is a health system building block?",opts:["Economic growth","Access to public transport","Politics","Service delivery"],ans:3}],6:[{q:"Poor infrastructure can cause hunger in a country.",opts:["True","False"],ans:0},{q:"Desertification is typically a result of ___.",opts:["Drought","Deforestation","Inappropriate agriculture","All of the given"],ans:3}],7:[{q:"Which of the following is a type of energy?",opts:["Fossil fuels","Nuclear power","Traditional biomass","All of the given"],ans:3},{q:"The Paris Agreement is a legally binding treaty on ___.",opts:["Climate change","Education","Poverty","None"],ans:0}],8:[{q:"The Okayama Commitment is from ___.",opts:["Russia","South Korea","North Korea","Japan"],ans:3},{q:"Sustainability issues must be looked at through a ___ approach.",opts:["Isolated thinking","Independent thinking","Silos thinking","Systems thinking"],ans:3}],9:[{q:"Activities like fish bowl discussion help ___.",opts:["Passive thinking","Critical and reflexive thinking","Rote-memory","All of the given"],ans:1},{q:"___ intelligences is proposed by Howard Gardner.",opts:["Multiple","Singular","Double","Triple"],ans:0}],10:[{q:"Sustainable leaders look at immediate, short-term gains.",opts:["True","False"],ans:1},{q:"Which of the following is a part of the 3Ps of triple bottom line?",opts:["Profit","Passion","Party","Pivot"],ans:0}],11:[{q:"There is one universal curriculum to become a sustainable leader.",opts:["True","False"],ans:1},{q:"A sustainable leader has a ___ decision-making style.",opts:["Forceful","Autocratic","Selfish","Consensual"],ans:3}],12:[{q:"___ resources are those that exist in the absence of human intervention.",opts:["Artificial","Natural","Fake","Real"],ans:1},{q:"The food sector accounts for ___ percent of total GHG emissions.",opts:["3","22","100","90"],ans:1}]};

let selectedWeeks='all', orderMode='random', quizMode='exam', timerEnabled=false, timerSeconds=30;
let queue=[], currentQ=null, answered=false, totalAnswered=0, correctCount=0, wrongCount=0;
let answeredHistory=[], historyViewIdx=-1;

(function initWeekGrid(){
  const grid=document.getElementById('week-grid');
  for(let w=0;w<=12;w++){
    const btn=document.createElement('button');
    btn.className='week-btn';
    btn.dataset.week=w;
    btn.textContent=`Wk ${w}`;
    btn.onclick=()=>toggleWeek(w);
    grid.appendChild(btn);
  }
  grid.querySelector('[data-week="all"]').onclick=()=>{
    selectedWeeks='all';
    grid.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('selected'));
    grid.querySelector('[data-week="all"]').classList.add('selected');
  };
})();

function toggleWeek(w){
  const grid=document.getElementById('week-grid');
  const allBtn=grid.querySelector('[data-week="all"]');
  const thisBtn=grid.querySelector(`[data-week="${w}"]`);
  if(selectedWeeks==='all'){
    selectedWeeks=new Set();
    allBtn.classList.remove('selected');
  }
  if(selectedWeeks.has(w)){
    selectedWeeks.delete(w);
    thisBtn.classList.remove('selected');
    if(selectedWeeks.size===0){
      selectedWeeks='all';
      allBtn.classList.add('selected');
    }
  }else{
    selectedWeeks.add(w);
    thisBtn.classList.add('selected');
  }
}

function setOrder(m){orderMode=m;document.getElementById('btn-random').classList.toggle('selected',m==='random');document.getElementById('btn-ordered').classList.toggle('selected',m==='ordered');}

function setMode(m){quizMode=m;document.getElementById('btn-exam').classList.toggle('selected',m==='exam');document.getElementById('btn-learn').classList.toggle('selected',m==='learn');}

function toggleTimer(on){timerEnabled=on;document.getElementById('timer-seconds').disabled=!on;}

function buildQueue(){
  let weeks=selectedWeeks==='all'?Object.keys(RAW).map(Number):[...selectedWeeks];
  let items=[];
  weeks.forEach(w=>{RAW[w].forEach((q,i)=>items.push({...q,week:w,idx:i}));});
  if(orderMode==='random'){
    for(let i=items.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [items[i],items[j]]=[items[j],items[i]];
    }
  }
  return items;
}

function startQuiz(){
  timerSeconds=parseInt(document.getElementById('timer-seconds').value)||30;
  queue=buildQueue();
  totalAnswered=0;
  correctCount=0;
  wrongCount=0;
  answeredHistory=[];
  historyViewIdx=-1;
  showScreen('quiz');
  loadNext();
}

function loadNext(){
  answered=false;
  historyViewIdx=-1;
  document.getElementById('feedback-msg').textContent='';
  document.getElementById('feedback-msg').className='feedback-msg';
  document.getElementById('next-btn').style.display='none';
  document.getElementById('prev-btn').style.display='none';
  document.getElementById('next-btn').textContent='Next →';
  if(queue.length>0){
    currentQ={...queue.shift(),isRepeat:false};
  }else{
    showResults();
    return;
  }
  updateTopbar();
  renderQuestion();
}

function updateTopbar(){
  const done=totalAnswered;
  const total=queue.length+totalAnswered+1;
  document.getElementById('q-count').textContent=`${done+1} / ${total}`;
  document.getElementById('score-correct').textContent=correctCount;
  document.getElementById('score-wrong').textContent=wrongCount;
}

function renderQuestion(){
  document.getElementById('q-text').textContent=currentQ.q;
  const list=document.getElementById('q-options');
  list.innerHTML='';
  const letters=['A','B','C','D','E'];
  currentQ.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick=()=>selectOption(i,btn);
    list.appendChild(btn);
  });
}

function selectOption(idx,btn){
  if(answered)return;
  answered=true;
  const opts=document.querySelectorAll('.option');
  opts.forEach(o=>o.classList.add('locked'));
  const isCorrect=idx===currentQ.ans;
  const msg=document.getElementById('feedback-msg');
  if(isCorrect){
    btn.classList.add('correct');
    msg.textContent='✓ Correct';
    msg.className='feedback-msg correct';
    correctCount++;
  }else{
    btn.classList.add('wrong');
    opts[currentQ.ans].classList.add('correct');
    opts.forEach((o,i)=>{if(i!==idx&&i!==currentQ.ans)o.classList.add('dimmed');});
    msg.textContent='✗ Wrong — correct: '+String.fromCharCode(65+currentQ.ans);
    msg.className='feedback-msg wrong';
    wrongCount++;
  }
  answeredHistory.push({q:currentQ,userAns:idx,isCorrect});
  totalAnswered++;
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('prev-btn').style.display=answeredHistory.length>0?'inline-block':'none';
  updateTopbar();
}

function nextQuestion(){
  if(historyViewIdx>=0){
    if(historyViewIdx<answeredHistory.length-1){
      historyViewIdx++;
      renderHistoryItem(historyViewIdx);
    }else{
      historyViewIdx=-1;
      loadNext();
    }
    return;
  }
  loadNext();
}

function prevQuestion(){
  if(answeredHistory.length===0)return;
  if(historyViewIdx===-1){
    historyViewIdx=answeredHistory.length-1;
  }else if(historyViewIdx>0){
    historyViewIdx--;
  }else{
    return;
  }
  renderHistoryItem(historyViewIdx);
}

function renderHistoryItem(idx){
  const entry=answeredHistory[idx];
  const q=entry.q;
  const letters=['A','B','C','D','E'];
  document.getElementById('q-text').textContent=q.q;
  const list=document.getElementById('q-options');
  list.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option locked';
    btn.innerHTML=`<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    if(i===q.ans)btn.classList.add('correct');
    else if(i===entry.userAns&&!entry.isCorrect)btn.classList.add('wrong');
    else if(entry.userAns!==-1&&i!==q.ans&&i!==entry.userAns)btn.classList.add('dimmed');
    list.appendChild(btn);
  });
  const msg=document.getElementById('feedback-msg');
  if(entry.isCorrect){
    msg.textContent='✓ Correct';
    msg.className='feedback-msg correct';
  }else{
    msg.textContent='✗ Wrong — correct: '+String.fromCharCode(65+q.ans);
    msg.className='feedback-msg wrong';
  }
  document.getElementById('prev-btn').style.display=idx>0?'inline-block':'none';
  document.getElementById('next-btn').style.display='inline-block';
  document.getElementById('next-btn').textContent=idx<answeredHistory.length-1?'Next →':'Back to Quiz →';
}

function showResults(){
  const total=totalAnswered;
  const pct=total>0?Math.round((correctCount/total)*100):0;
  document.getElementById('res-total').textContent=total;
  document.getElementById('res-correct').textContent=correctCount;
  document.getElementById('res-wrong').textContent=wrongCount;
  document.getElementById('res-pct').textContent=pct+'%';
  showScreen('results');
}

function goSetup(){showScreen('setup');}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
</script>
</body>
</html>
